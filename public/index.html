<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e5e5e2;
    --border-strong: #d0d0cc;
    --text: #1a1a18;
    --text-2: #6b6b67;
    --text-3: #9e9e9a;
    --accent: #1a1a18;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --amber-border: #fde68a;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --blue-border: #bfdbfe;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Layout */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 20px 20px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.2px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .sidebar-logo span { color: var(--text-3); font-weight: 400; }
  .sidebar-section { padding: 12px 12px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    margin: 1px 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-2);
    transition: background 0.1s, color 0.1s;
    border: none;
    background: none;
    width: calc(100% - 12px);
    text-align: left;
    font-family: inherit;
  }
  .sidebar-item:hover { background: var(--bg); color: var(--text); }
  .sidebar-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
  .sidebar-item .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sidebar-footer {
    margin-top: auto;
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .main { flex: 1; min-width: 0; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-title { font-size: 14px; font-weight: 500; flex: 1; }
  .content { padding: 28px 32px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.1s;
    border: 1px solid transparent;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-ghost { background: transparent; color: var(--text-2); border-color: transparent; }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }
  .btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
  }
  .card-sm { padding: 16px 20px; }

  /* Client cards */
  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .client-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .client-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .client-card-add {
    border-style: dashed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 160px;
    color: var(--text-3);
    transition: border-color 0.15s, color 0.15s;
  }
  .client-card-add:hover { border-color: var(--border-strong); color: var(--text-2); }
  .avatar {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
  }

  /* KPI Row */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; }
  .kpi-label { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-gray { background: var(--bg); color: var(--text-2); border: 1px solid var(--border); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

  /* Tables */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-3); border-bottom: 1px solid var(--border);
    white-space: nowrap; background: var(--surface);
  }
  .data-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tbody tr:last-child td { border-bottom: none; }
  .data-table tbody tr { transition: background 0.1s; cursor: pointer; }
  .data-table tbody tr:hover td { background: var(--bg); }
  .data-table .name-col { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 0; }
  .tab-btn {
    padding: 10px 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: none; font-family: inherit;
    color: var(--text-3); border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color 0.1s;
  }
  .tab-btn:hover { color: var(--text-2); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

  /* Steps */
  .steps { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
  .step-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--text-3); flex: 1;
  }
  .step-item.active { color: var(--text); }
  .step-item.done { color: var(--green); }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border-strong);
    background: var(--surface); color: var(--text-3);
    flex-shrink: 0;
  }
  .step-item.active .step-num { background: var(--text); color: #fff; border-color: var(--text); }
  .step-item.done .step-num { background: var(--green); color: #fff; border-color: var(--green); }
  .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; max-width: 40px; }

  /* Form */
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
  .form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .form-input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border-strong); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    font-size: 13px; font-family: inherit; transition: border-color 0.1s;
    appearance: none;
  }
  .form-input:focus { outline: none; border-color: var(--text); }
  .form-input::placeholder { color: var(--text-3); }
  textarea.form-input { resize: vertical; line-height: 1.5; }
  select.form-input { cursor: pointer; }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--text); background: #f0f0ec; }
  .drop-zone-icon { font-size: 32px; margin-bottom: 8px; color: var(--text-3); }
  .drop-zone-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .drop-zone-sub { font-size: 12px; color: var(--text-3); }

  /* Alert */
  .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; border: 1px solid; }
  .alert-red { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .alert-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .alert-amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .alert-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }

  /* Misc */
  .section-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .row { display: flex; gap: 16px; }
  .col { flex: 1; min-width: 0; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .hidden { display: none !important; }

  /* Inline edit */
  .inline-edit {
    width: 100%; font-size: 12px; padding: 3px 6px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--text); font-family: inherit;
  }
  .inline-edit:focus { outline: none; border-color: var(--text); background: var(--surface); }

  /* Funnel bars */
  .funnel-row { display: flex; gap: 6px; align-items: flex-end; height: 100px; margin-bottom: 8px; }
  .funnel-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .funnel-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; }
  .funnel-val { font-size: 11px; font-weight: 600; }
  .funnel-lbl { font-size: 10px; color: var(--text-3); text-align: center; }
  .funnel-pct { font-size: 9px; color: var(--text-3); }

  /* Scrollable table wrapper */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .table-wrap .data-table th:first-child, .table-wrap .data-table td:first-child { padding-left: 20px; }
  .table-wrap .data-table th:last-child, .table-wrap .data-table td:last-child { padding-right: 20px; }

  /* Analysis row */
  .analysis-item {
    display: flex; align-items: center; gap: 16px; padding: 14px 20px;
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    margin-bottom: 8px; cursor: pointer; background: var(--surface);
    transition: border-color 0.15s;
  }
  .analysis-item:hover { border-color: var(--border-strong); }

  /* Bar chart replacement */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .bar-label { width: 120px; flex-shrink: 0; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .bar-track { flex: 1; background: var(--bg); border-radius: 3px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .bar-value { width: 80px; flex-shrink: 0; color: var(--text-2); font-weight: 500; }

  /* Winner / loser items */
  .signal-item { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 8px; border: 1px solid; }
  .signal-item .si-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .signal-item .si-meta { font-size: 11px; margin-top: 3px; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; color: var(--text-3); }
  .empty h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }

  /* Report textarea */
  #report-output {
    width: 100%; min-height: 480px; padding: 20px;
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--surface); font-family: 'Courier New', monospace;
    font-size: 12px; line-height: 1.7; color: var(--text);
    resize: vertical;
  }
  #report-output:focus { outline: none; border-color: var(--text); }

  /* Notification */
  .notif {
    position: fixed; top: 16px; right: 16px;
    background: var(--text); color: #fff;
    padding: 10px 16px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; z-index: 999;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .notif.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .two-col, .three-col { grid-template-columns: 1fr; }
    .content { padding: 20px 16px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Creative <span>intelligence</span></div>
    <div style="padding: 8px 6px;">
      <div class="sidebar-section">Clients</div>
      <div id="sidebar-clients"></div>
      <div class="sidebar-section" style="margin-top:8px">Feedback &amp; Tracking</div>
      <div id="sidebar-tools"></div>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-secondary btn-sm" onclick="doExport()" style="flex:1">Export</button>
      <label class="btn btn-secondary btn-sm" style="flex:1;cursor:pointer;justify-content:center">
        Import
        <input type="file" accept=".json" style="display:none" onchange="doImport(event)">
      </label>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div id="topbar-actions"></div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="notif" id="notif"></div>

// ─── Utils ────────────────────────────────────────────────────────────────────
function toN(v) { const f = parseFloat(String(v||0).replace(/[$,%\s]/g,'')); return isNaN(f) ? 0 : f; }

function fmtMoney(v) {
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'k';
  return '$' + v.toFixed(0);
}
function fmtPct(v) { return v.toFixed(2) + '%'; }
function fmtNum(v) { return v >= 1000 ? (v/1000).toFixed(1)+'k' : String(Math.round(v)); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── CSV Parser ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  if (!text || !text.trim()) return { error: 'No data provided.', rows: [], headers: [] };
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { error: 'Need at least a header row and one data row.', rows: [], headers: [] };

  function parseLine(line) {
    const vals = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    return vals;
  }

  const headerVals = parseLine(lines[0]);
  const headers = headerVals.map(h => h.replace(/^"|"$/g,'').trim());
  if (headers.length < 2) return { error: 'Headers not detected. Make sure CSV uses commas as delimiters.', rows: [], headers: [] };

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i]);
    const row = {};
    headers.forEach((h, j) => { row[h] = (vals[j] || '').replace(/^"|"$/g,'').trim(); });
    rows.push(row);
  }
  return { error: null, headers, rows };
}

const COL_MAP = {
  spend: ['amount spent (usd)', 'spend', 'cost', 'amount spent'],
  impressions: ['impressions', 'impr'],
  clicks: ['link clicks', 'clicks'],
  ctr: ['ctr (link click-through rate)', 'ctr (all)', 'ctr', 'click-through rate'],
  cpm: ['cpm (cost per 1,000 impressions) (usd)', 'cpm (cost per 1,000 impressions)', 'cpm'],
  lpv: ['landing page views', 'landing page view', 'lpv'],
  results: ['results'],
  cpl: ['cost per results', 'cost per lead (usd)', 'cost per lead', 'cpl'],
  adName: ['ad name', 'ad', 'creative name', 'name'],
  adSet: ['ad set name', 'adset name', 'ad set', 'adset'],
  reach: ['reach'],
  frequency: ['frequency']
};

function detectColumns(headers) {
  const lh = headers.map(h => h.toLowerCase().trim());
  const found = {};
  for (const [key, aliases] of Object.entries(COL_MAP)) {
    for (const alias of aliases) {
      const idx = lh.findIndex(h => h === alias || h.includes(alias));
      if (idx >= 0) { found[key] = headers[idx]; break; }
    }
  }
  return found;
}

function enrichRows(rawRows, colMap, clientId) {
  return rawRows.map(r => {
    const o = { ...r };
    o._adName = colMap.adName ? r[colMap.adName] : (r[Object.keys(r)[0]] || '');
    o._adSet  = colMap.adSet  ? r[colMap.adSet]  : '';
    o._spend      = toN(colMap.spend       ? r[colMap.spend]       : 0);
    o._impressions= toN(colMap.impressions  ? r[colMap.impressions] : 0);
    o._clicks     = toN(colMap.clicks      ? r[colMap.clicks]      : 0);
    o._ctr        = toN(colMap.ctr         ? r[colMap.ctr]         : 0);
    o._cpm        = toN(colMap.cpm         ? r[colMap.cpm]         : 0);
    o._lpv        = toN(colMap.lpv         ? r[colMap.lpv]         : 0);
    o._results    = toN(colMap.results     ? r[colMap.results]     : 0);
    o._reach      = toN(colMap.reach       ? r[colMap.reach]       : 0);
    return o;
  }).filter(r => r._adName && r._adName.length > 0);
}

function classifyAd(name, clientId) {
  const n = (name||'').toLowerCase();
  const r = { format: 'Unknown', avatar: 'Unknown', conf: 'low' };
  if (clientId === 'asher') {
    if (n.includes('vslq'))                               { r.format = 'VSL Queen';          r.conf = 'high'; }
    else if (n.includes('winner'))                        { r.format = 'Video – winner';      r.conf = 'high'; }
    else if (n.includes('protest'))                       { r.format = 'Protest video';       r.conf = 'high'; }
    else if (n.includes('overhead'))                      { r.format = 'Overhead video';      r.conf = 'high'; }
    else if (n.includes('notebook') && n.includes('motion')) { r.format = 'Animated – notebook'; r.conf = 'high'; }
    else if ((n.includes('phone') || n.includes('phone-ui')) && n.includes('motion')) { r.format = 'Animated – phone UI'; r.conf = 'high'; }
    else if (n.includes('carousel') || n.includes('caro')) { r.format = 'Carousel';           r.conf = 'high'; }
    else if (n.includes('tables'))                        { r.format = 'Tables video';        r.conf = 'high'; }
    else if (n.includes('image') || n.includes('static') || n.includes('ugly') || n.includes('product-shot') || n.includes('editorial') || n.includes('board') || n.includes('sign') || n.includes('sticknote')) { r.format = 'Static'; r.conf = 'high'; }
    else if (n.includes('video') || n.includes('batch'))  { r.format = 'Video';              r.conf = 'medium'; }

    if (n.includes('gym') || n.includes('fitness'))       r.avatar = 'Gym';
    else if (n.includes('medspa') || n.includes('med_spa') || n.includes('med-spa')) r.avatar = 'Med Spa';
    else if (n.includes('chiro'))                         r.avatar = 'Chiro';
    else if (n.includes('broad') || n.includes('| jp') || n.includes('woman') || n.includes('group')) r.avatar = 'Broad';
  } else if (clientId === 'nwac') {
    if (n.includes('fakepr') || n.includes('aerial') || n.includes('teambreaking')) { r.format = 'Static – FakePR'; r.conf = 'high'; }
    else if (n.includes('editorial'))        { r.format = 'Static – editorial'; r.conf = 'high'; }
    else if (n.includes('3-units') || n.includes('mortgage')) { r.format = 'Video – founder'; r.conf = 'high'; }
    else if (n.includes('carousel') || n.includes('window')) { r.format = 'Carousel'; r.conf = 'high'; }
    else if (n.includes('anim'))             { r.format = 'Animation'; r.conf = 'high'; }
    else if (n.includes('static') || n.includes('new_board') || n.includes('sticknote')) { r.format = 'Static – other'; r.conf = 'high'; }
    else if (n.includes('video'))            { r.format = 'Video'; r.conf = 'medium'; }

    if (n.startsWith('nwac_'))               r.avatar = 'OR/AZ/WA';
    else if (n.includes('so-california') || n.includes('so_california')) r.avatar = 'So-California';
    else if (n.startsWith('ssw_'))           r.avatar = 'California';
  }
  return r;
}

function signalOf(r) {
  if (r._results >= 3 && r._spend > 100) return 'winner';
  if (r._results >= 1 && r._spend > 50)  return 'watch';
  if (r._results === 0 && r._spend > 200) return 'low';
  return 'insuff';
}

  APP.clients[cid].analyses = APP.clients[cid].analyses.filter(a => a.id !== aid);
  saveState();
  renderMain();
  notify('Analysis deleted.');
}

// ─── Wizard ───────────────────────────────────────────────────────────────────
function startWizard(clientId) {
  APP.wizard = { step: 1, name: '', dateRange: '', notes: '', rawCSV: '', parsed: null, cls: [] };
  nav('wizard', { clientId });
}

function renderWizard(el) {
  const c = APP.clients[APP.clientId];
  const w = APP.wizard;
  const steps = ['Batch info', 'Import data', 'Review', 'Confirm'];

  let stepsHtml = '<div class="steps">';
  steps.forEach((s, i) => {
    const state = i+1 < w.step ? 'done' : i+1 === w.step ? 'active' : '';
    const icon = i+1 < w.step ? '✓' : i+1;
    stepsHtml += `<div class="step-item ${state}"><div class="step-num">${icon}</div><span>${s}</span></div>`;
    if (i < steps.length-1) stepsHtml += '<div class="step-line"></div>';
  });
  stepsHtml += '</div>';

  let stepContent = '';

  if (w.step === 1) {
    stepContent = `<div style="max-width:500px">
      <div class="form-group">
        <label class="form-label">Batch name *</label>
        <input class="form-input" id="w-name" placeholder="First batch Jun–Jul 2026" value="${esc(w.name)}" autofocus>
        <div class="form-hint">Give this batch a clear name so you can find it later.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Date range</label>
        <input class="form-input" id="w-date" placeholder="Jun 22 – Jul 21, 2026" value="${esc(w.dateRange)}">
      </div>
      <div class="form-group">
        <label class="form-label">Batch notes <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
        <textarea class="form-input" id="w-notes" rows="3" placeholder="New landing pages, budget changes, ad sets included…">${esc(w.notes)}</textarea>
        <div class="form-hint">Only applies to this analysis — doesn't overwrite the client context.</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-ghost" onclick="nav('client',{clientId:'${APP.clientId}',analysisId:null})">Cancel</button>
        <button class="btn btn-primary" onclick="wizardStep1()">Continue →</button>
      </div>
    </div>`;
  }

  else if (w.step === 2) {
    stepContent = `<div style="max-width:620px">
      <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">Upload your CSV export from Meta Ads Manager, or paste the data directly.</p>

      <div class="drop-zone" id="dropzone" onclick="document.getElementById('csv-file').click()">
        <div class="drop-zone-icon">↑</div>
        <div class="drop-zone-title">Drop your CSV file here</div>
        <div class="drop-zone-sub">or click to browse · .csv files only</div>
        <input type="file" id="csv-file" accept=".csv,.txt" style="display:none">
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin:16px 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:12px;color:var(--text-3)">or paste CSV data</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <div class="form-group">
        <textarea class="form-input" id="csv-paste" rows="10" style="font-family:monospace;font-size:11px;line-height:1.5" placeholder="Ad name,Ad set name,Amount spent (USD),Impressions,CPM (cost per 1,000 impressions) (USD),Link clicks,CTR (link click-through rate),Landing page views,Results,...&#10;Image 4 | JP,Broad | Advantage+,13429.48,137063,97.98,1552,1.13,1171,90,...">${esc(w.rawCSV)}</textarea>
      </div>

      <div id="csv-preview"></div>
      <div id="csv-error"></div>

      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-ghost" onclick="wizardBack()">← Back</button>
        <button class="btn btn-primary" id="parse-btn" onclick="wizardStep2()">Parse and continue →</button>
      </div>
    </div>`;
  }

  else if (w.step === 3) {
    const parsed = w.parsed || [];
    const tSpend = parsed.reduce((s,r) => s+(r._spend||0), 0);
    const tResults = parsed.reduce((s,r) => s+(r._results||0), 0);
    stepContent = `<div>
      <div class="alert alert-blue" style="margin-bottom:20px">
        <strong>${parsed.length} ads detected</strong> · ${fmtMoney(tSpend)} total spend · ${tResults} total results.
        Edit any format or avatar below before saving.
      </div>
      <div class="table-wrap" style="max-height:360px;overflow-y:auto;margin-bottom:20px">
        <table class="data-table">
          <thead><tr>
            <th>Ad name</th><th>Ad set</th>
            <th>Spend</th><th>Results</th>
            <th>Format</th><th>Avatar</th><th>Confidence</th>
          </tr></thead>
          <tbody id="cls-tbody"></tbody>
        </table>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="wizardBack()">← Back</button>
        <button class="btn btn-primary" onclick="wizardStep3()">Continue →</button>
      </div>
    </div>`;
  }

  else if (w.step === 4) {
    const parsed = w.parsed || [];
    const spend = parsed.reduce((s,r) => s+(r._spend||0), 0);
    const results = parsed.reduce((s,r) => s+(r._results||0), 0);
    stepContent = `<div style="max-width:440px">
      <div class="card" style="margin-bottom:24px">
        <div class="section-title">Ready to save</div>
        ${[['Batch', w.name], ['Date range', w.dateRange||'—'], ['Client', c.name], ['Ads imported', parsed.length], ['Total spend', fmtMoney(spend)], ['Total results', results]]
          .map(([k,v]) => `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-2)"><span>${k}</span><strong style="color:var(--text)">${v}</strong></div>`).join('')}
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="wizardBack()">← Back</button>
        <button class="btn btn-primary" onclick="wizardSave()">Save and open dashboard →</button>

  el.innerHTML = `<div style="max-width:800px">${stepsHtml}${stepContent}</div>`;

      dropzone.addEventListener('drop', e => {
        e.preventDefault(); dropzone.classList.remove('drag');
        const f = e.dataTransfer.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = ev => { ta.value = ev.target.result; showCSVPreview(ev.target.result); };
        reader.readAsText(f);
      });
    }

    if (ta) {
      ta.addEventListener('input', () => {
        if (ta.value.trim().length > 20) showCSVPreview(ta.value);

      if (w.rawCSV) showCSVPreview(w.rawCSV);

  // Wire up step 3 table
  if (w.step === 3) {
    const tbody = document.getElementById('cls-tbody');
    if (tbody) {
      (w.parsed||[]).forEach((r, i) => {
        const cl = w.cls[i] || {};
        const tr = document.createElement('tr');
        tr.style.cursor = 'default';
        tr.innerHTML = `<td class="name-col" style="max-width:160px">${esc(r._adName)}</td>
          <td style="color:var(--text-2);font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r._adSet)}</td>
          <td>${fmtMoney(r._spend)}</td>
          <td>${r._results||0}</td>
          <td><input class="inline-edit" value="${esc(cl.format||'')}" style="width:140px" data-i="${i}" data-k="format" onchange="APP.wizard.cls[parseInt(this.dataset.i)][this.dataset.k]=this.value"></td>
          <td><input class="inline-edit" value="${esc(cl.avatar||'')}" style="width:100px" data-i="${i}" data-k="avatar" onchange="APP.wizard.cls[parseInt(this.dataset.i)][this.dataset.k]=this.value"></td>
          <td><span class="badge ${cl.conf==='high'?'badge-green':cl.conf==='medium'?'badge-amber':'badge-gray'}">${esc(cl.conf||'low')}</span></td>`;
        tbody.appendChild(tr);
      });
    }
  }
}

function showCSVPreview(text) {
  const prevEl = document.getElementById('csv-preview');
  const errEl  = document.getElementById('csv-error');
  if (!prevEl || !errEl) return;
  const { error, headers, rows } = parseCSV(text);
  if (error) {
    errEl.innerHTML  = `<div class="alert alert-red">${esc(error)}</div>`;
    prevEl.innerHTML = '';
    return;
  }
  errEl.innerHTML = '';
  const cm = detectColumns(headers);
  const detected = Object.entries(cm).map(([k,v]) => `<span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;white-space:nowrap"><strong>${k}</strong>: ${esc(v)}</span>`).join(' ');
  const missing  = ['spend','impressions','clicks','results','adName'].filter(k => !cm[k]);
  prevEl.innerHTML = `<div class="alert alert-green" style="margin-top:4px">
    <strong>${rows.length} rows detected · ${headers.length} columns</strong>
    <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${detected}</div>
    ${missing.length ? `<div style="margin-top:6px;color:var(--amber)">⚠ Not mapped: ${missing.join(', ')} — check your column names</div>` : ''}
  </div>`;
}

function wizardStep1() {
  const name = (document.getElementById('w-name')||{}).value || '';
  if (!name.trim()) { alert('Enter a batch name.'); document.getElementById('w-name').focus(); return; }
  APP.wizard.name      = name.trim();
  APP.wizard.dateRange = ((document.getElementById('w-date')||{}).value||'').trim();
  APP.wizard.notes     = ((document.getElementById('w-notes')||{}).value||'').trim();
  APP.wizard.step      = 2;
  renderMain();
}

function wizardStep2() {
  const ta = document.getElementById('csv-paste');
  const raw = (ta ? ta.value : APP.wizard.rawCSV) || '';
  if (!raw.trim()) { alert('Paste or upload CSV data.'); return; }
  APP.wizard.rawCSV = raw;

  const { error, rows } = parseCSV(raw);
  if (error) { document.getElementById('csv-error').innerHTML = `<div class="alert alert-red">${esc(error)}</div>`; return; }
  const cm = detectColumns(Object.keys(rows[0]||{}));
  const enriched = enrichRows(rows, cm, APP.clientId);
  if (!enriched.length) { document.getElementById('csv-error').innerHTML = '<div class="alert alert-red">No valid ad rows found. Make sure the CSV has an "Ad name" column.</div>'; return; }

  APP.wizard.parsed = enriched;
  APP.wizard.cls    = enriched.map(r => ({ adName: r._adName, ...classifyAd(r._adName, APP.clientId) }));
  APP.wizard.step   = 3;
  renderMain();
}

function wizardStep3() {
  APP.wizard.step = 4;
  renderMain();
}

function wizardBack() {
  if (APP.wizard.step > 1) { APP.wizard.step--; renderMain(); }
  else nav('client', { clientId: APP.clientId, analysisId: null });
}

function wizardSave() {
  const a = {
    id: Date.now().toString(),
    name: APP.wizard.name,
    dateRange: APP.wizard.dateRange,
    notes: APP.wizard.notes,
    createdAt: new Date().toISOString(),
    rows: APP.wizard.parsed,
    classifications: APP.wizard.cls,
    reportText: ''
  };
  if (!APP.clients[APP.clientId].analyses) APP.clients[APP.clientId].analyses = [];
  APP.clients[APP.clientId].analyses.push(a);
  saveState();
  notify('Analysis saved.');
  nav('analysis', { clientId: APP.clientId, analysisId: a.id, tab: 'dashboard' });
}

// ─── Analysis ─────────────────────────────────────────────────────────────────
function renderAnalysis(el) {
  const c = APP.clients[APP.clientId];
  const a = c && c.analyses ? c.analyses.find(x => x.id === APP.analysisId) : null;
  if (!a) { el.innerHTML = '<div class="empty"><p>Analysis not found.</p></div>'; return; }

  const rows   = a.rows || [];
  const cls    = a.classifications || [];
  const enrich = rows.map((r,i) => ({
    ...r,
    _format:  cls[i]?.format  || 'Unknown',
    _avatar:  cls[i]?.avatar  || r._adSet || 'Unknown',
    _signal:  signalOf(r)
  }));

  const tSpend   = enrich.reduce((s,r) => s+(r._spend||0), 0);
  const tResults = enrich.reduce((s,r) => s+(r._results||0), 0);
  const tImpr    = enrich.reduce((s,r) => s+(r._impressions||0), 0);
  const tClicks  = enrich.reduce((s,r) => s+(r._clicks||0), 0);
  const tLPV     = enrich.reduce((s,r) => s+(r._lpv||0), 0);
  const avgCPL   = tResults > 0 ? tSpend/tResults : 0;
  const avgCTR   = tImpr    > 0 ? tClicks/tImpr*100 : 0;
  const avgCPM   = tImpr    > 0 ? tSpend/tImpr*1000 : 0;
  const c2l      = tClicks  > 0 ? tLPV/tClicks*100 : 0;
  const l2r      = tLPV     > 0 ? tResults/tLPV*100 : 0;

  // Ad set agg
  const asAgg = {};
  enrich.forEach(r => {
    const k = r._adSet || 'Unknown';
    if (!asAgg[k]) asAgg[k] = { n:k, spend:0, results:0, impressions:0, clicks:0, lpv:0 };
    asAgg[k].spend       += r._spend||0;
    asAgg[k].results     += r._results||0;
    asAgg[k].impressions += r._impressions||0;
    asAgg[k].clicks      += r._clicks||0;
    asAgg[k].lpv         += r._lpv||0;
  });
  const asArr = Object.values(asAgg).map(d => ({
    ...d,
    cpl: d.results>0 ? d.spend/d.results : 0,
    ctr: d.impressions>0 ? d.clicks/d.impressions*100 : 0,
    cpm: d.impressions>0 ? d.spend/d.impressions*1000 : 0
  })).sort((a,b) => b.spend-a.spend);

  // Format agg
  const fmAgg = {};
  enrich.forEach(r => {
    const k = r._format;
    if (!fmAgg[k]) fmAgg[k] = { n:k, spend:0, results:0, count:0 };
    fmAgg[k].spend   += r._spend||0;
    fmAgg[k].results += r._results||0;
    fmAgg[k].count   ++;
  });
  const fmArr = Object.values(fmAgg).sort((a,b) => b.spend-a.spend);

  const winners   = enrich.filter(r => r._signal==='winner').sort((a,b) => b._results-a._results);
  const watching  = enrich.filter(r => r._signal==='watch').sort((a,b) => b._results-a._results);
  const underperf = enrich.filter(r => r._signal==='low').sort((a,b) => b._spend-a._spend);

  const maxSpend = Math.max(...asArr.map(d => d.spend), 1);

  el.innerHTML = `
  <div class="tabs">
    <button class="tab-btn ${APP.tab==='dashboard'?'active':''}" onclick="APP.tab='dashboard';renderAnalysis(document.getElementById('content'))">Dashboard</button>
    <button class="tab-btn ${APP.tab==='creatives'?'active':''}" onclick="APP.tab='creatives';renderAnalysis(document.getElementById('content'))">Creatives</button>
    <button class="tab-btn ${APP.tab==='report'?'active':''}" onclick="APP.tab='report';renderAnalysis(document.getElementById('content'))">Written report</button>
  </div>
  <div id="tab-body"></div>`;

  const body = document.getElementById('tab-body');

  if (APP.tab === 'dashboard') {
    const cplColor = avgCPL>0&&avgCPL<150 ? 'var(--green)' : avgCPL>250 ? 'var(--red)' : 'var(--text)';
    const metaBase = 'https://adsmanager.facebook.com/adsmanager/manage/ads?filter_by=ad_name&filter_value=';

    // Avatar aggregates
    const avAgg = {};
    enrich.forEach(r => {
      const k = r._avatar || 'Unknown';
      if (!avAgg[k]) avAgg[k] = { n:k, spend:0, results:0, impressions:0, clicks:0, lpv:0 };
      avAgg[k].spend += r._spend||0; avAgg[k].results += r._results||0;
      avAgg[k].impressions += r._impressions||0; avAgg[k].clicks += r._clicks||0; avAgg[k].lpv += r._lpv||0;
    });
    const avArr = Object.values(avAgg).map(d => ({...d,
      cpl: d.results>0 ? d.spend/d.results : 0,
      ctr: d.impressions>0 ? d.clicks/d.impressions*100 : 0,
      cpm: d.impressions>0 ? d.spend/d.impressions*1000 : 0,
      c2l: d.clicks>0 ? d.lpv/d.clicks*100 : 0,
      l2r: d.lpv>0 ? d.results/d.lpv*100 : 0
    })).sort((a,b) => b.spend-a.spend);

    // Top 5 best / worst
    const top5   = [...enrich].filter(r => r._results>0 && r._spend>50)
      .sort((a,b) => (a._spend/Math.max(a._results,1))-(b._spend/Math.max(b._results,1))).slice(0,5);
    const worst5 = [...enrich].filter(r => r._results===0 && r._spend>100)
      .sort((a,b) => b._spend-a._spend).slice(0,5);

    // Build takeaways — priority: format×avatar cross-performance first
    const tk = [];

    // 1. Format × avatar: which format is working, for which avatar
    const fmAvAgg = {};
    enrich.forEach(r => {
      const k = (r._format||'Unknown') + '|||' + (r._avatar||'Unknown');
      if (!fmAvAgg[k]) fmAvAgg[k] = { format:r._format||'Unknown', avatar:r._avatar||'Unknown', spend:0, results:0, count:0 };
      fmAvAgg[k].spend   += r._spend||0;
      fmAvAgg[k].results += r._results||0;
      fmAvAgg[k].count++;
    });
    const fmAvArr = Object.values(fmAvAgg)
      .filter(d => d.results>0 && d.spend>50)
      .map(d => ({...d, cpl: d.spend/d.results}))
      .sort((a,b) => a.cpl-b.cpl);

    if (fmAvArr.length>0) {
      const best = fmAvArr[0];
      const worst = [...Object.values(fmAvAgg)]
        .filter(d => d.results===0 && d.spend>100)
        .sort((a,b) => b.spend-a.spend)[0];
      let fmTk = best.format+' is the strongest format for '+best.avatar+' — '+best.results+' result'+(best.results!==1?'s':'')+' at '+fmtMoney(best.cpl)+' CPL.';
      if (worst) fmTk += ' '+worst.format+' has 0 results in '+worst.avatar+' on '+fmtMoney(worst.spend)+' spend.';
      tk.push(fmTk);
    } else if (Object.values(fmAvAgg).some(d=>d.spend>50)) {
      // No results yet but can still flag what format/avatar got the most spend
      const topSpend = Object.values(fmAvAgg).sort((a,b)=>b.spend-a.spend)[0];
      tk.push('No format-avatar combination has results yet. Most spend on '+topSpend.format+' / '+topSpend.avatar+' ('+fmtMoney(topSpend.spend)+') with 0 conversions.');
    }

    // 2. Best avatar overall
    const topAv = avArr.find(d => d.results>0);
    const bottomAv = [...avArr].filter(d=>d.results===0&&d.spend>100).sort((a,b)=>b.spend-a.spend)[0];
    if (topAv) {
      let avTk = topAv.n+' is the most efficient avatar — '+topAv.results+' results at '+fmtMoney(topAv.cpl)+' CPL.';
      if (bottomAv) avTk += ' '+bottomAv.n+' has spent '+fmtMoney(bottomAv.spend)+' with 0 results.';
      tk.push(avTk);
    }

    // 3. Account CPL health
    if (avgCPL>0) tk.push(avgCPL<150 ? 'Account CPL is '+fmtMoney(avgCPL)+' — healthy.' : 'Account CPL is '+fmtMoney(avgCPL)+' — above target. Concentrate spend on what\'s converting.');

    // 4. Top individual performer
    if (top5.length>0) tk.push('Best ad: '+top5[0]._adName.slice(0,45)+' ('+top5[0]._format+', '+top5[0]._avatar+') — '+top5[0]._results+' results at '+fmtMoney(top5[0]._spend/top5[0]._results)+' CPL.');

    // 5. Funnel bottleneck or biggest waste
    if (c2l>0 && c2l<70) tk.push('Click→LPV is '+fmtPct(c2l)+' — below 70%. Likely a landing page or tracking issue, not a creative problem.');
    else if (l2r>0 && l2r<5) tk.push('LPV→result is '+fmtPct(l2r)+' — post-click conversion is the bottleneck. The creative is working; the landing page or offer is not.');
    else if (worst5.length>0) tk.push(worst5[0]._adName.slice(0,45)+' ('+worst5[0]._format+', '+worst5[0]._avatar+') — '+fmtMoney(worst5[0]._spend)+' spent with 0 results. Pause candidate.');

    // Pre-build HTML strings (avoids template literal complexity)
    const tkHtml = tk.map((t,i) =>
      '<div style="display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4">'
      +'<span style="opacity:0.35;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px">'+(i+1)+'</span>'
      +'<span>'+esc(t)+'</span></div>').join('');

    const avRowsHtml = avArr.map(d => {
      const cc = d.cpl>0&&d.cpl<150?'var(--green)':d.cpl>250?'var(--red)':'var(--text)';
      return '<tr style="cursor:default">'
        +'<td style="font-weight:500">'+esc(d.n)+'</td>'
        +'<td>'+fmtMoney(d.spend)+'</td>'
        +'<td>'+d.results+'</td>'
        +'<td style="color:'+cc+';font-weight:600">'+(d.results>0?fmtMoney(d.cpl):'—')+'</td>'
        +'<td>'+fmtPct(d.ctr)+'</td>'
        +'<td>'+fmtMoney(d.cpm)+'</td>'
        +'<td style="color:'+(d.c2l>0&&d.c2l<70?'var(--amber)':'var(--text)')+'">'+(d.clicks>0?fmtPct(d.c2l):'—')+'</td>'
        +'<td style="color:'+(d.l2r>0&&d.l2r<5?'var(--amber)':'var(--text)')+'">'+(d.lpv>0?fmtPct(d.l2r):'—')+'</td>'
        +'</tr>';
    }).join('');

    const buildMetaLink = (r, style) => '<a href="'+metaBase+encodeURIComponent(r._adName)+'" target="_blank" rel="noopener" style="'+style+'">&#8599; View in Meta</a>';

    const top5Html = top5.length===0 ? '<p style="font-size:13px;color:var(--text-3)">No ads with results yet.</p>' :
      top5.map((r,i) => {
        const cpl = r._spend/Math.max(r._results,1);
        return '<div class="signal-item" style="background:var(--green-bg);border-color:var(--green-border);margin-bottom:8px">'
          +'<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">'
          +'<span style="font-size:10px;font-weight:700;color:var(--green);opacity:0.5">'+(i+1)+'</span>'
          +'<span style="font-size:12px;font-weight:600;color:#14532d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r._adName)+'</span></div>'

window._ciEnriched = [];
function filterTable() {
  const enrich = window._ciEnriched || [];
  const srch   = (document.getElementById('srch')?.value||'').toLowerCase();
  const fSet   = document.getElementById('f-adset')?.value||'';
  const fFmt   = document.getElementById('f-fmt')?.value||'';
  const hideI  = document.getElementById('hide-insuff')?.checked||false;

  const filtered = enrich.filter(r => {
    if (fSet && r._adSet !== fSet) return false;
    if (fFmt && r._format !== fFmt) return false;
    if (hideI && r._signal === 'insuff') return false;
    if (srch && !r._adName.toLowerCase().includes(srch)) return false;
    return true;
  });

  const tbody = document.getElementById('creative-tbody');
  const countEl = document.getElementById('row-count');
  if (countEl) countEl.textContent = `${filtered.length} ads`;
  if (!tbody) return;

  tbody.innerHTML = '';
  filtered.forEach(r => {
    const cpl = r._results>0 ? r._spend/r._results : 0;
    const cplColor = cpl>0&&cpl<150 ? 'var(--green)' : cpl>250 ? 'var(--red)' : 'var(--text)';
    const sigBadge = r._signal==='winner'  ? '<span class="badge badge-green">winner</span>'
                   : r._signal==='watch'   ? '<span class="badge badge-amber">watch</span>'
                   : r._signal==='low'     ? '<span class="badge badge-red">underperforming</span>'
                   : '<span class="badge badge-gray">low data</span>';
    const tr = document.createElement('tr');
    tr.style.cursor = 'default';
    tr.innerHTML = `
      <td class="name-col" style="max-width:200px;font-weight:${r._signal==='winner'?'600':'400'}">${esc(r._adName)}</td>
      <td style="color:var(--text-2);font-size:12px">${esc(r._format)}</td>
      <td style="color:var(--text-2);font-size:12px">${esc(r._avatar)}</td>
      <td>${fmtMoney(r._spend)}</td>
      <td>${fmtPct(r._ctr)}</td>
      <td>${r._lpv||'—'}</td>
      <td>${r._results||0}</td>
      <td style="color:${cplColor}">${cpl>0?fmtMoney(cpl):'—'}</td>
      <td>${sigBadge}</td>
      <td><a href="https://adsmanager.facebook.com/adsmanager/manage/ads?filter_by=ad_name&filter_value=${encodeURIComponent(r._adName)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--blue);text-decoration:none;">&#8599;</a></td>`;
    tbody.appendChild(tr);
  });
}

// ─── Report generation ────────────────────────────────────────────────────────
async function generateReport(cid, aid) {
  const c  = APP.clients[cid];
  const a  = c.analyses.find(x => x.id === aid);
  if (!a) return;
  const rows = a.rows||[], cls = a.classifications||[];
  const enrich = rows.map((r,i) => ({...r,_format:cls[i]?.format||'Unknown',_avatar:cls[i]?.avatar||r._adSet||'Unknown',_signal:signalOf(r)}));
  const tSpend = enrich.reduce((s,r)=>s+(r._spend||0),0);
  const tRes   = enrich.reduce((s,r)=>s+(r._results||0),0);
  const asAgg={};enrich.forEach(r=>{const k=r._adSet||'Unknown';if(!asAgg[k])asAgg[k]={n:k,spend:0,results:0};asAgg[k].spend+=r._spend||0;asAgg[k].results+=r._results||0;});
  const fmAgg={};enrich.forEach(r=>{const k=r._format;if(!fmAgg[k])fmAgg[k]={n:k,spend:0,results:0,count:0};fmAgg[k].spend+=r._spend||0;fmAgg[k].results+=r._results||0;fmAgg[k].count++;});

  const summary = `Client: ${c.name}
Batch: ${a.name} | ${a.dateRange||''}
Account: ${fmtMoney(tSpend)} spend, ${tRes} results, CPL ${tRes>0?fmtMoney(tSpend/tRes):'—'}

Ad sets:
${Object.values(asAgg).map(d=>`${d.n}: ${fmtMoney(d.spend)}, ${d.results} results, CPL ${d.results>0?fmtMoney(d.spend/d.results):'—'}`).join('\n')}

Formats:
${Object.values(fmAgg).map(d=>`${d.n}: ${d.count} ads, ${fmtMoney(d.spend)}, ${d.results} results, CPL ${d.results>0?fmtMoney(d.spend/d.results):'—'}`).join('\n')}

Winners:
${enrich.filter(r=>r._signal==='winner').map(r=>`${r._adName}: ${r._results} results, CPL ${fmtMoney(r._spend/r._results)}`).join('\n')||'None'}

Underperformers:
${enrich.filter(r=>r._signal==='low').map(r=>`${r._adName}: ${fmtMoney(r._spend)}, 0 results`).join('\n')||'None'}

Client context:
${c.namingNotes||''}
${a.notes||''}`;

  const st = document.getElementById('gen-status');
  if (st) st.textContent = 'Generating…';

  const promptText = 'You are a performance creative analyst. Write a concise creative performance analysis. '
    + 'Structure: 1) Executive takeaways (max 5 bullets) 2) Performance by ad set (key numbers + 1-2 line diagnosis each) '
    + '3) Format trends 4) Winners (name + why + data) 5) Underperformers 6) Next-batch recommendations (max 5). '
    + 'Be direct, no fluff, no basic metric definitions. Use "early signal", "not enough to conclude", "worth testing".\n\n'
    + summary;

  try {
    const resp = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: promptText, maxTokens: 1000 })
    });
    const data = await resp.json();
    if (!resp.ok) { if (st) st.textContent = data.error || 'Error generating report.'; return; }
    const text = data.text || 'Could not generate report.';
    c.analyses = c.analyses.map(x => x.id===aid ? {...x, reportText:text} : x);
    saveState();
    if (st) st.textContent = '';
    const ta = document.getElementById('report-output');
    if (ta) { ta.value = text; }
    else { APP.tab='report'; renderAnalysis(document.getElementById('content')); }
    notify('Report generated.');
  } catch(e) {
    if (st) st.textContent = 'Error — check connection and retry.';
  }
}

function updateReport(cid, aid, val) {
  const c = APP.clients[cid];
  if (c) { c.analyses = c.analyses.map(x => x.id===aid ? {...x, reportText:val} : x); saveState(); }
}
function copyReport() {
  const ta = document.getElementById('report-output');
  if (ta) { navigator.clipboard?.writeText(ta.value); notify('Copied to clipboard.'); }
}

async function extractContext() {
  const txt = document.getElementById('ctx-doc')?.value; if (!txt) return;
  const st = document.getElementById('ctx-status'); if (st) st.textContent = 'Extracting…';
  const extractPrompt = 'Extract these fields and return ONLY valid JSON: name, description, offer, avatars (comma-separated), resultMetric, namingNotes.\n\n' + txt;

  try {
    const resp = await fetch('/api/classify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: extractPrompt, maxTokens: 800 })
    });
    const data = await resp.json();
    if (!resp.ok) { if (st) st.textContent = data.error || 'Could not parse — fill in manually.'; return; }
    const text = data.text || '';
    const d = JSON.parse(text.replace(/```json|```/g,'').trim());

function getFeedback(clientId) {
  try {
    const raw = localStorage.getItem(feedbackKey(clientId));
    if (raw) { const d = JSON.parse(raw); return { learnings: d.learnings || [], ideas: d.ideas || [] }; }
  } catch (e) {}
  return { learnings: [], ideas: [] };
}
function saveFeedback(clientId, data) {
  try { localStorage.setItem(feedbackKey(clientId), JSON.stringify(data)); } catch (e) {}
}
function getMastersheet(clientId) {
  try {
    const raw = localStorage.getItem(mastersheetKey(clientId));
    if (raw) {
      const d = JSON.parse(raw);
      const rows = d.rows || [];
      // If this tab was visited before any historical rows existed for this
      // client, localStorage already holds an empty rows array — re-seed it
      // now that we have real Drive-backed defaults, instead of leaving it
      // empty forever.
      if (rows.length === 0 && DEFAULT_MASTERSHEETS[clientId]) {
        saveMastersheet(clientId, DEFAULT_MASTERSHEETS[clientId]);
        return { rows: DEFAULT_MASTERSHEETS[clientId].rows.slice() };
      }
      return { rows: rows };
    }
    if (DEFAULT_MASTERSHEETS[clientId]) {
      saveMastersheet(clientId, DEFAULT_MASTERSHEETS[clientId]);
      return { rows: DEFAULT_MASTERSHEETS[clientId].rows.slice() };
    }
  } catch (e) {}
  return { rows: [] };
}
function saveMastersheet(clientId, data) {
  try { localStorage.setItem(mastersheetKey(clientId), JSON.stringify(data)); } catch (e) {}
}
function restoreMastersheetDefaults(clientId) {
  if (!DEFAULT_MASTERSHEETS[clientId]) return false;
  // Merge, don't overwrite: put the seed rows back (in case they were edited
  // away or never loaded) while keeping any rows added by hand since then.
  const current = getMastersheet(clientId).rows || [];
  const seedIds = {};
  const seedRows = DEFAULT_MASTERSHEETS[clientId].rows.map(function (r) { seedIds[r.id] = true; return Object.assign({}, r); });
  const keptRows = current.filter(function (r) { return !seedIds[r.id]; });
  saveMastersheet(clientId, { rows: seedRows.concat(keptRows) });
  return true;
}
function restoreResourcesDefaults(clientId) {
  if (!DEFAULT_RESOURCES[clientId]) return false;
  const blank = { doc: '', gamePlan: '', positioning: '', figma: '', weekly: '' };
  saveResources(clientId, Object.assign({}, blank, DEFAULT_RESOURCES[clientId]));
  return true;
}
function getResources(clientId) {
  const blank = { doc: '', gamePlan: '', positioning: '', figma: '', weekly: '' };
  try {
    const raw = localStorage.getItem(resourcesKey(clientId));
    if (raw) {
      const parsed = Object.assign({}, blank, JSON.parse(raw));
      const isEmpty = !parsed.doc && !parsed.gamePlan && !parsed.positioning && !parsed.figma && !parsed.weekly;
      if (isEmpty && DEFAULT_RESOURCES[clientId]) {
        const seeded = Object.assign({}, blank, DEFAULT_RESOURCES[clientId]);
        saveResources(clientId, seeded);
        return seeded;
      }
      return parsed;
    }
    if (DEFAULT_RESOURCES[clientId]) {
      const seeded = Object.assign({}, blank, DEFAULT_RESOURCES[clientId]);
      saveResources(clientId, seeded);
      return seeded;
    }
  } catch (e) {}
  return blank;
}

const OPTIONS_KEY = 'ci_options_v1';
const OPTION_DEFAULTS = {
  feedbackTypes: ['Insight', 'Rule', 'Legal', 'Compliance', 'Avatar', 'Format', 'Copy', 'Other'],
  feedbackSources: ['Client call', 'Slack', 'ClickUp', 'Manual', 'Meeting notes'],
  feedbackCategories: ['Format', 'Copy', 'ICP', 'Compliance', 'Design', 'Disclaimer'],

  mastersheetStatuses: ['Uploaded', 'In progress', 'Waiting approval', 'N/A'],
  sopStages: ['Brief', 'Brainstorm', 'Review/Assignment', 'Production', 'Delivery']
};
const CATEGORY_COLOR_DEFAULTS = {
  Format: '#8b5cf6', Copy: '#eab308', ICP: '#4c1d95',
  Compliance: '#b45309', Design: '#ec4899', Disclaimer: '#0d9488',
  Brief: '#6b7280', Brainstorm: '#2563eb', 'Review/Assignment': '#d97706',
  Production: '#7c3aed', Delivery: '#16a34a'
};
const CATEGORY_COLOR_FALLBACK = '#6b7280';

function loadOptionSets() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(OPTIONS_KEY) || '{}') || {}; } catch (e) { saved = {}; }
  const merged = {};
  Object.keys(OPTION_DEFAULTS).forEach(function (k) {
    merged[k] = (saved[k] && saved[k].length) ? saved[k] : OPTION_DEFAULTS[k].slice();
  });
  merged.categoryColors = Object.assign({}, CATEGORY_COLOR_DEFAULTS, saved.categoryColors || {});
  return merged;
}
let OPTION_SETS = loadOptionSets();
function saveOptionSets() {
  try { localStorage.setItem(OPTIONS_KEY, JSON.stringify(OPTION_SETS)); } catch (e) {}
}
function getCategoryColor(name) {
  return OPTION_SETS.categoryColors[name] || CATEGORY_COLOR_FALLBACK;
}

let OPTIONS_PANEL_OPEN = false;

function wireOptionsToggle(sections, afterChange) {

  if (!btn) return;

// sections: [{ key: 'feedbackTypes', label: 'Learning Type', colors: false }, ...]
function renderOptionsPanel(sections, afterChange) {
  const wrap = document.getElementById('options-panel-wrap');
  if (!wrap) return;
  if (!OPTIONS_PANEL_OPEN) { wrap.innerHTML = ''; return; }

  let html = '<div class="card card-sm" style="margin-bottom:20px;background:var(--blue-bg);border-color:var(--blue-border)">';
  html += '<p style="font-size:12px;color:var(--text-2);margin-bottom:14px">Add, rename, or remove the choices that show up in these dropdowns.</p>';
  sections.forEach(function (s) {
    const opts = OPTION_SETS[s.key];
    html += '<div style="margin-bottom:16px">';
    html += '<label class="form-label">' + esc(s.label) + '</label>';
    html += '<div class="chip-row" data-key="' + esc(s.key) + '" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">';
    opts.forEach(function (o) {
      const style = s.colors ? ('background:' + getCategoryColor(o) + ';color:#fff;border-color:' + getCategoryColor(o)) : '';
      html += '<span class="badge" style="' + style + ';display:inline-flex;gap:6px;align-items:center">'
        + (s.colors ? '<input type="color" data-action="chip-color" data-key="' + esc(s.key) + '" data-value="' + esc(o) + '" value="' + esc(getCategoryColor(o)) + '" style="width:14px;height:14px;padding:0;border:none;cursor:pointer">' : '')
        + esc(o)
        + ' <button type="button" data-action="chip-remove" data-key="' + esc(s.key) + '" data-value="' + esc(o) + '" style="background:none;border:none;color:inherit;cursor:pointer;font-weight:700;padding:0">&times;</button>'
        + '</span>';
    });
    html += '</div>';
    html += '<div style="display:flex;gap:8px">'
      + '<input class="form-input" style="max-width:220px" placeholder="New option…" data-role="new-option" data-key="' + esc(s.key) + '">'
      + '<button class="btn btn-ghost btn-sm" data-action="chip-add" data-key="' + esc(s.key) + '">+ Add</button>'
      + '</div>';
    html += '</div>';
  });
  html += '</div>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('[data-action="chip-remove"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const key = btn.dataset.key, val = btn.dataset.value;
      OPTION_SETS[key] = OPTION_SETS[key].filter(function (o) { return o !== val; });
      saveOptionSets();
      renderOptionsPanel(sections, afterChange);
      if (afterChange) afterChange();
    });
  });
  wrap.querySelectorAll('[data-action="chip-color"]').forEach(function (input) {
    input.addEventListener('input', function () {
      OPTION_SETS.categoryColors[input.dataset.value] = input.value;
      saveOptionSets();
      renderOptionsPanel(sections, afterChange);
      if (afterChange) afterChange();
    });
  });
  wrap.querySelectorAll('[data-action="chip-add"]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const key = btn.dataset.key;
      const input = wrap.querySelector('[data-role="new-option"][data-key="' + key + '"]');
      const val = (input.value || '').trim();
      if (!val || OPTION_SETS[key].indexOf(val) !== -1) return;
      OPTION_SETS[key].push(val);
      if (key === 'feedbackCategories' && !OPTION_SETS.categoryColors[val]) {
        OPTION_SETS.categoryColors[val] = CATEGORY_COLOR_FALLBACK;
      }
      saveOptionSets();
      renderOptionsPanel(sections, afterChange);
      if (afterChange) afterChange();
    });
  });
}

let MASTERSHEET_UI = { readOnly: false, openAccordion: null, addOpenFor: null };

// Turns any http(s) URL inside a text value into a clickable link, leaving the
// rest of the text as-is. Used for the "text + optional link" mastersheet fields.
function linkifyHtml(text) {
  const str = text || '';
  const parts = str.split(/(https?:\/\/[^\s]+)/g);
  return parts.map(function (part) {
    if (/^https?:\/\//.test(part)) {
      const safeUrl = esc(part);
      return '<a href="' + safeUrl + '" target="_blank" rel="noopener" style="color:var(--blue)">' + safeUrl + '</a>';
    }
    return esc(part);
  }).join('');
}
function editableLinkCellHtml(field, value, width) {
  const url = (String(value || '').match(/https?:\/\/[^\s]+/) || [''])[0];
  let html = '<div style="display:flex;align-items:center;gap:4px">'
    + '<input class="inline-edit" data-field="' + field + '" value="' + esc(value) + '" style="width:' + width + 'px">';
  if (url) {
    html += '<a href="' + esc(url) + '" target="_blank" rel="noopener" title="Open link" style="flex-shrink:0;text-decoration:none">&#128279;</a>';
  }
  html += '</div>';
  return html;
}

function mastersheetStatusBadge(status) {

}

function renderResourcesBlock(clientId) {
  const wrap = document.getElementById('ms-resources-' + clientId);
  if (!wrap) return;

  const hasDefaults = !!(DEFAULT_MASTERSHEETS[clientId] || DEFAULT_RESOURCES[clientId]);

    + '<div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em">SOCAL Briefs</div>'

    const val = data[t] || '';
    html += '<div style="display:flex;align-items:center;gap:6px">'
      + '<span style="font-size:12px;color:var(--text-2)">' + esc(RESOURCE_LABELS[t]) + ':</span>';

    html += '</div>';
  });

  wrap.onchange = function (e) {
    const t = e.target.dataset.resource;

    notes: (document.getElementById('msn-notes-' + clientId) || {}).value || '',
    status: (document.getElementById('msn-status-' + clientId) || {}).value || 'N/A',
    aaac: (document.getElementById('msn-aaac-' + clientId) || {}).value || ''
  };
  data.rows.push(row);
  saveMastersheet(clientId, data);
  MASTERSHEET_UI.addOpenFor = null;
  renderMastersheetAddForm(clientId);
  renderMastersheetRows(clientId);
  notify('Row added.');
}

function renderMastersheetRows(clientId) {
  const tbody = document.getElementById('ms-tbody-' + clientId);
  if (!tbody) return;
  const data = getMastersheet(clientId);
  const rows = data.rows;
  const ro = MASTERSHEET_UI.readOnly;
  const cols = ro ? 7 : 8;
  if (!rows.length) {
    tbody.innerHTML = '<tr style="cursor:default"><td colspan="' + cols + '" style="text-align:center;color:var(--text-3);padding:24px">No creatives logged yet.</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  rows.forEach(function (r) {
    const tr = document.createElement('tr');
    tr.style.cursor = 'default';
    tr.dataset.id = r.id;
    if (ro) {
      tr.innerHTML =
        '<td>' + esc(r.date) + '</td>'
        + '<td class="name-col">' + esc(r.name) + '</td>'
        + '<td>' + linkifyHtml(r.creative) + '</td>'
        + '<td>' + linkifyHtml(r.copy) + '</td>'
        + '<td>' + esc(r.notes) + '</td>'
        + '<td>' + mastersheetStatusBadge(r.status) + '</td>'
        + '<td>' + esc(r.aaac) + '</td>';
    } else {
      tr.innerHTML =
        '<td><input type="date" class="inline-edit" data-field="date" value="' + esc(r.date) + '"></td>'
        + '<td><input class="inline-edit" data-field="name" value="' + esc(r.name) + '" style="width:120px"></td>'
        + '<td>' + editableLinkCellHtml('creative', r.creative, 120) + '</td>'
        + '<td>' + editableLinkCellHtml('copy', r.copy, 120) + '</td>'
        + '<td><textarea class="inline-edit" data-field="notes" rows="1" style="width:140px">' + esc(r.notes) + '</textarea></td>'
        + '<td><select class="inline-edit" data-field="status">' + selectOptionsHtml(OPTION_SETS.mastersheetStatuses, r.status) + '</select></td>'
        + '<td><input class="inline-edit" data-field="aaac" value="' + esc(r.aaac) + '" style="width:80px"></td>'
        + '<td><button class="btn btn-danger btn-xs" data-action="delete">Delete</button></td>';
    }
    tbody.appendChild(tr);
  });

  if (ro) return;

  tbody.onchange = function (e) {
    const field = e.target.dataset.field;
    if (!field) return;
    const tr = e.target.closest('tr');
    const id = tr && tr.dataset.id;
    if (!id) return;
    const d = getMastersheet(clientId);
    d.rows = d.rows.map(function (row) {
      if (row.id !== id) return row;
      const updated = Object.assign({}, row);
      updated[field] = e.target.value;
      return updated;
    });
    saveMastersheet(clientId, d);
  };
  tbody.onclick = function (e) {
    const btn = e.target.closest('[data-action="delete"]');
    if (!btn) return;
    const tr = btn.closest('tr');
    const id = tr && tr.dataset.id;
    if (!id) return;
    if (!confirm('Delete this row?')) return;
    const d = getMastersheet(clientId);
    d.rows = d.rows.filter(function (row) { return row.id !== id; });
    saveMastersheet(clientId, d);
    renderMastersheetRows(clientId);
  };
}

// ─── Creative SOP board ────────────────────────────────────────────────────────
// Per-client Kanban tracking batches through the Creative Refresh SOP's stages
// (Brief → Brainstorm → Review/Assignment → Production → Delivery). Stages are
// just another editable option set (OPTION_SETS.sopStages), so "Manage options"
// on this tab lets the stages themselves be renamed/recolored/extended as the
// SOP gets adapted to other clients — nothing here is hardcoded to Asher.
let SOP_UI = { addOpen: false };

function renderSopBoard(el) {
  OPTIONS_PANEL_OPEN = false;
  const clientIds = Object.keys(APP.clients);
  if (!clientIds.length) { el.innerHTML = '<div class="empty"><p>Add a client first.</p></div>'; return; }
  const clientId = APP.clients[APP.clientId] ? APP.clientId : clientIds[0];

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px">'
    + '<div style="display:flex;align-items:center;gap:12px">'
    + '<label class="form-label" style="margin:0">Client</label>'
    + '<select class="form-input" id="sop-client-select" style="width:220px">'
    + Object.values(APP.clients).map(function (cl) {
        return '<option value="' + esc(cl.id) + '"' + (cl.id === clientId ? ' selected' : '') + '>' + esc(cl.name) + '</option>';
      }).join('')
    + '</select></div>'
    + '<div style="display:flex;gap:10px">' + renderOptionsToggle() + '<button class="btn btn-primary btn-sm" id="sop-add-btn">+ Add batch</button></div>'
    + '</div>'
    + '<div id="options-panel-wrap"></div>'
    + '<div id="sop-form-wrap"></div>'
    + '<div id="sop-board" style="display:flex;gap:14px;overflow-x:auto;padding-bottom:8px"></div>';
  el.innerHTML = html;

  document.getElementById('sop-client-select').addEventListener('change', function (e) {
    nav('sop', { clientId: e.target.value });
  });
  document.getElementById('sop-add-btn').addEventListener('click', function () {
    SOP_UI.addOpen = !SOP_UI.addOpen;
    renderSopAddForm(clientId);
  });
  wireOptionsToggle([{ key: 'sopStages', label: 'SOP Stages', colors: true }], function () {
    renderSopAddForm(clientId);
    renderSopColumns(clientId);
  });

  renderSopAddForm(clientId);
  renderSopColumns(clientId);
}

function renderSopAddForm(clientId) {
  const wrap = document.getElementById('sop-form-wrap');
  if (!wrap) return;
  if (!SOP_UI.addOpen) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = '<div class="card card-sm" style="margin-bottom:16px;background:var(--blue-bg);border-color:var(--blue-border)">'
    + '<div class="two-col" style="margin-bottom:16px">'
    + '<div class="form-group" style="margin-bottom:0"><label class="form-label">Batch name</label><input class="form-input" id="sopn-name" placeholder="e.g. Cycle 3 — August batch"></div>'
    + '<div class="form-group" style="margin-bottom:0"><label class="form-label">Owner</label><input class="form-input" id="sopn-owner" placeholder="e.g. Jose, Lina, Asher internal"></div>'
    + '</div>'
    + '<div class="two-col" style="margin-bottom:16px">'
    + '<div class="form-group" style="margin-bottom:0"><label class="form-label">Stage</label><select class="form-input" id="sopn-stage">' + selectOptionsHtml(OPTION_SETS.sopStages, OPTION_SETS.sopStages[0]) + '</select></div>'
    + '<div class="form-group" style="margin-bottom:0"><label class="form-label">Due date</label><input type="date" class="form-input" id="sopn-due"></div>'
    + '</div>'
    + '<div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="sopn-notes" rows="2"></textarea></div>'
    + '<div style="display:flex;gap:10px"><button class="btn btn-ghost btn-sm" id="sopn-cancel">Cancel</button><button class="btn btn-primary btn-sm" id="sopn-save">Save batch</button></div>'
    + '</div>';
  document.getElementById('sopn-cancel').addEventListener('click', function () { SOP_UI.addOpen = false; renderSopAddForm(clientId); });
  document.getElementById('sopn-save').addEventListener('click', function () { saveSopBatch(clientId); });
}

function saveSopBatch(clientId) {
  const data = getBatches(clientId);
  const batch = {
    id: newRowId(),
    name: (document.getElementById('sopn-name') || {}).value || 'Untitled batch',
    owner: (document.getElementById('sopn-owner') || {}).value || '',
    stage: (document.getElementById('sopn-stage') || {}).value || OPTION_SETS.sopStages[0],
    due: (document.getElementById('sopn-due') || {}).value || '',
    notes: (document.getElementById('sopn-notes') || {}).value || ''
  };
  data.items.push(batch);
  saveBatches(clientId, data);
  SOP_UI.addOpen = false;
  renderSopAddForm(clientId);
  renderSopColumns(clientId);
  notify('Batch added.');
}

function renderSopColumns(clientId) {
  const wrap = document.getElementById('sop-board');
  if (!wrap) return;
  const data = getBatches(clientId);
  const stages = OPTION_SETS.sopStages;
  wrap.innerHTML = '';
  stages.forEach(function (stage, idx) {
    const col = document.createElement('div');
    col.style.cssText = 'flex:0 0 240px;min-width:240px';
    const items = data.items.filter(function (b) { return b.stage === stage; });
    let colHtml = '<div style="margin-bottom:10px">' + categoryBadgeHtml(stage) + ' <span style="font-size:11px;color:var(--text-3)">(' + items.length + ')</span></div>';
    if (!items.length) {
      colHtml += '<div style="font-size:12px;color:var(--text-3);padding:12px;border:1px dashed var(--border);border-radius:var(--radius);text-align:center">No batches</div>';
    }
    items.forEach(function (b) {
      colHtml += '<div class="card card-sm" data-batch="' + esc(b.id) + '" style="margin-bottom:10px;padding:12px">'
        + '<div style="font-size:13px;font-weight:600;margin-bottom:4px">' + esc(b.name) + '</div>'
        + (b.owner ? ('<div style="font-size:11px;color:var(--text-2);margin-bottom:4px">' + esc(b.owner) + '</div>') : '')
        + (b.due ? ('<div style="font-size:11px;color:var(--text-3);margin-bottom:6px">Due ' + esc(b.due) + '</div>') : '')
        + (b.notes ? ('<div style="font-size:12px;color:var(--text-2);margin-bottom:8px">' + esc(b.notes) + '</div>') : '')
        + '<div style="display:flex;gap:6px;align-items:center">'
        + (idx > 0 ? '<button class="btn btn-ghost btn-xs" data-action="sop-back" data-batch="' + esc(b.id) + '">&larr;</button>' : '')
        + (idx < stages.length - 1 ? '<button class="btn btn-ghost btn-xs" data-action="sop-forward" data-batch="' + esc(b.id) + '">&rarr;</button>' : '')
        + '<button class="btn btn-danger btn-xs" data-action="sop-delete" data-batch="' + esc(b.id) + '" style="margin-left:auto">Delete</button>'
        + '</div></div>';
    });
    col.innerHTML = colHtml;
    wrap.appendChild(col);
  });

  wrap.onclick = function (e) {
    const back = e.target.closest('[data-action="sop-back"]');
    const fwd = e.target.closest('[data-action="sop-forward"]');
    const del = e.target.closest('[data-action="sop-delete"]');
    if (!back && !fwd && !del) return;
    const id = (back || fwd || del).dataset.batch;
    const d = getBatches(clientId);
    const b = d.items.find(function (x) { return x.id === id; });
    if (!b) return;
    if (del) {
      if (!confirm('Delete this batch?')) return;
      d.items = d.items.filter(function (x) { return x.id !== id; });
    } else {
      const curIdx = stages.indexOf(b.stage);
      const nextIdx = back ? curIdx - 1 : curIdx + 1;
      if (nextIdx >= 0 && nextIdx < stages.length) b.stage = stages[nextIdx];
    }
    saveBatches(clientId, d);
    renderSopColumns(clientId);
  };
}

// ─── Export / Import ──────────────────────────────────────────────────────────
function collectFeedbackAndMastersheet() {
  const feedback = {};
  const mastersheet = {};
  const resources = {};
  const batches = {};
  Object.keys(APP.clients).forEach(function (cid) {
    feedback[cid] = getFeedback(cid);
    mastersheet[cid] = getMastersheet(cid);
    resources[cid] = getResources(cid);
    batches[cid] = getBatches(cid);
  });
  return { feedback: feedback, mastersheet: mastersheet, resources: resources, batches: batches };
}

function doExport() {
  const extra = collectFeedbackAndMastersheet();
  const payload = { clients: APP.clients, feedback: extra.feedback, mastersheet: extra.mastersheet, resources: extra.resources, batches: extra.batches, options: OPTION_SETS };
  const b = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a'); a.href = u; a.download = 'creative_platform.json'; a.click();
  notify('Exported.');
}
function doImport(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.clients) { APP.clients = { ...DEFAULT_CLIENTS, ...d.clients }; saveState(); }
      if (d.feedback) { Object.keys(d.feedback).forEach(function (cid) { saveFeedback(cid, d.feedback[cid]); }); }
      if (d.mastersheet) { Object.keys(d.mastersheet).forEach(function (cid) { saveMastersheet(cid, d.mastersheet[cid]); }); }
      if (d.resources) { Object.keys(d.resources).forEach(function (cid) { saveResources(cid, d.resources[cid]); }); }
      if (d.batches) { Object.keys(d.batches).forEach(function (cid) { saveBatches(cid, d.batches[cid]); }); }
      if (d.options) { OPTION_SETS = Object.assign({}, OPTION_SETS, d.options); saveOptionSets(); }
      renderSidebar(); renderMain(); notify('Imported.');
    } catch(err) { alert('Invalid file.'); }
  };
  reader.readAsText(f);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadState();
renderSidebar();
renderMain();
</script>
